# Codex CLI 프로젝트 설정 (minimal profile)
# 공식 문서: https://developers.openai.com/codex/config-reference/
# 참고: 프로젝트 로컬 MCP preset은 init.sh 실행 시 이 파일에 추가됩니다.

model = "gpt-5.1-codex-mini"
model_reasoning_effort = "low"
model_reasoning_summary = "concise"
sandbox_mode = "workspace-write"
approval_policy = "on-request"

[features]
multi_agent = true

[tui]
notifications = true
